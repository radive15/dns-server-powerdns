services:

  # === SERVICE 1: PostgreSQL — Backend database untuk PowerDNS ===
  postgres:
    image: postgres:15-alpine          # alpine = image lebih kecil, cocok untuk production
    container_name: pdns-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}       # dibaca dari file .env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data              # data persistent
      - ./config/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # auto-run saat pertama kali
    networks:
      - pdns_network
    healthcheck:                         # PowerDNS hanya start setelah postgres benar-benar siap
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === SERVICE 2: PowerDNS Authoritative Server ===
  pdns:
    image: powerdns/pdns-auth-49:latest
    container_name: pdns-server
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/pdns.conf:/etc/powerdns/pdns.conf
    command:
      - "--launch=gpgsql"
      - "--gpgsql-host=postgres"
      - "--gpgsql-port=5432"
      - "--gpgsql-dbname=${POSTGRES_DB}"
      - "--gpgsql-user=${POSTGRES_USER}"
      - "--gpgsql-password=${POSTGRES_PASSWORD}"
      - "--api=yes"
      - "--api-key=${PDNS_API_KEY}"
      - "--webserver=yes"
      - "--webserver-address=0.0.0.0"
      - "--webserver-port=8081"
      - "--webserver-allow-from=0.0.0.0/0"
      - "--loglevel=5"
      - "--log-dns-queries=yes"
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8081:8081"
    networks:
      - pdns_network
    restart: unless-stopped
  # === SERVICE 2: PowerDNS Authoritative Server ===
  pdns-admin:
    image: powerdnsadmin/pda-legacy:latest
    container_name: pdns-admin
    depends_on:
      - pdns
    environment:
      SECRET_KEY: ${PDNS_ADMIN_SECRET}
      SQLALCHEMY_DATABASE_URI: sqlite:////data/pda.db
      PDNS_HOST: pdns
      PDNS_PORT: 8081
      PDNS_API_KEY: ${PDNS_API_KEY}
    volumes:
      - pdns_admin_data:/data
    ports:
      - "9191:80"
    networks:
      - pdns_network
    restart: unless-stopped


networks:
  pdns_network:
    driver: bridge

volumes:
  postgres_data:
  pdns_admin_data:
